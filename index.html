<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' https://*.plex.direct:*; connect-src https://plex.tv https://*.plex.direct:*; base-uri 'none'; form-action 'none'">
  <title>The Plex Movie Picker</title>
  <!-- ICO for Safari (it handles ICO most reliably and skips the SVG it
       can't render); SVG for browsers that pick by type. -->
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <h1 class="app-title">The Plex Movie Picker</h1>

    <p id="status" class="status" hidden></p>

    <section id="signin-view" hidden>
      <button id="signin-btn" class="big-btn">Sign in with Plex</button>
    </section>

    <section id="picker-view" hidden>
      <div id="result" class="card" hidden>
        <div class="poster-wrap">
          <img id="poster" alt="Movie poster" hidden>
          <div id="poster-placeholder" class="poster-placeholder" hidden>
            <span>🎞️</span>
          </div>
        </div>
        <h2 class="title-box"><span id="movie-title"></span></h2>
        <p id="movie-meta"></p>
      </div>

      <button id="pick-btn" class="big-btn" disabled>Pick a film</button>

      <div class="filters">
        <button id="filter-runtime" class="filter-btn" type="button"
                title="100 minutes and under" aria-label="100 minutes and under"
                aria-pressed="false">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M12 7v5l3.5 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="filter-comedy" class="filter-btn" type="button"
                title="Only comedies" aria-label="Only comedies"
                aria-pressed="false">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M7.6 9.4c.6-.9 1.9-.9 2.5 0M13.9 9.4c.6-.9 1.9-.9 2.5 0" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M7.5 13h9a4.5 4.5 0 0 1-9 0z" fill="currentColor"/>
          </svg>
        </button>
        <button id="filter-horror" class="filter-btn" type="button"
                title="Only horror films" aria-label="Only horror films"
                aria-pressed="false">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path d="M12 6.2c-.3-1.7.3-3 1.7-3.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <ellipse cx="12" cy="14" rx="8.5" ry="7" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M6.9 13.2l1.7-2.7 1.7 2.7z" fill="currentColor"/>
            <path d="M13.7 13.2l1.7-2.7 1.7 2.7z" fill="currentColor"/>
            <path d="M7.2 16.6l1.6 1.4 1.6-1.4 1.6 1.4 1.6-1.4 1.6 1.4 1.6-1.4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <p class="footer">
        <span id="library-info"></span>
        <a href="#" id="signout-link">Sign out</a>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
